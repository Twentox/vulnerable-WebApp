services:
  web:
    build: .
    ports:
      - "8000:5000"
    volumes:
      - .:/server
    depends_on:
      - database
    env_file: 
      - .env
  database:
    image: mysql:latest
    container_name: mysql_database
    env_file:
      - .env
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data:
    


